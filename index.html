<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海克斯乱斗实验室</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e1a;--bg2:#111827;--card:#161d2f;--card2:#1c2540;--gold:#c8aa6e;--gold2:#e8d5a3;--txt:#e8e6e3;--txt2:#9ca3af;--txt3:#6b7280;--bd:#2d3748;--t-transform:#ff6b35;--t-recommend:#4ade80;--t-avoid:#f87171;--t-bug:#fbbf24;--r-silver:#8ba4c4;--r-gold:#e8a838;--r-prism:#e879a8;--green:#4ade80;--red:#f87171;--cyan:#22d3ee;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.nav{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,#0c1020,var(--bg));border-bottom:1px solid var(--bd)}
.nav-in{max-width:1320px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px}
.brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:1px}
.brand svg{width:26px;height:26px}
.tabs{display:flex;gap:3px}
.tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;border:none;background:none;transition:.2s}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.tab.on{color:var(--gold);background:rgba(200,170,110,.1)}
.ver{font-size:11px;color:var(--txt3);background:var(--card);padding:3px 10px;border-radius:16px}
.wrap{max-width:1320px;margin:0 auto;padding:20px 24px}
.pnl{display:none}.pnl.on{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;white-space:nowrap}
.b-transform{background:rgba(255,107,53,.15);color:var(--t-transform);box-shadow:0 0 8px rgba(255,107,53,.2)}
.b-recommend{background:rgba(74,222,128,.12);color:var(--t-recommend)}
.b-avoid{background:rgba(248,113,113,.12);color:var(--t-avoid)}
.b-bug{background:rgba(251,191,36,.15);color:var(--t-bug);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(251,191,36,.2)}50%{box-shadow:0 0 12px rgba(251,191,36,.4)}}
.b-ver{background:rgba(59,130,246,.12);color:var(--blue);font-size:10px}
.b-src-data{background:rgba(34,211,238,.1);color:var(--cyan)}
.b-src-comm{background:rgba(200,170,110,.1);color:var(--gold)}
.b-verified{background:rgba(74,222,128,.12);color:var(--green)}
.b-community{background:rgba(200,170,110,.1);color:var(--gold)}
.b-disputed{background:rgba(251,191,36,.12);color:var(--t-bug)}
.b-investigating{background:rgba(251,191,36,.12);color:var(--t-bug)}
.b-rarity{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.b-silver{background:rgba(139,164,196,.15);color:var(--r-silver)}
.b-gold{background:rgba(232,168,56,.15);color:var(--r-gold)}
.b-prism{background:rgba(232,121,168,.15);color:var(--r-prism)}
.b-role{background:rgba(255,255,255,.06);color:var(--txt2);font-size:10px;padding:2px 8px;border-radius:12px}
.b-tier{width:26px;height:26px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.tier-S{background:rgba(255,107,53,.15);color:var(--t-transform)}.tier-A{background:rgba(34,211,238,.12);color:var(--cyan)}.tier-B{background:rgba(74,222,128,.1);color:var(--green)}.tier-C{background:rgba(156,163,175,.1);color:var(--txt2)}.tier-unknown{background:rgba(156,163,175,.06);color:var(--txt3);font-size:10px;letter-spacing:1px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;transition:.2s}
.card:hover{border-color:rgba(200,170,110,.3)}
.ctrl{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.search{flex:1;min-width:180px;position:relative}
.search input{width:100%;padding:9px 14px 9px 36px;background:var(--card);border:1px solid var(--bd);border-radius:9px;color:var(--txt);font-size:13px;outline:none;transition:.2s}
.search input:focus{border-color:var(--gold)}
.search input::placeholder{color:var(--txt3)}
.search::before{content:"\2315";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:15px}
.pill{padding:7px 14px;border-radius:8px;background:var(--card);border:1px solid var(--bd);color:var(--txt2);font-size:12px;cursor:pointer;transition:.2s;white-space:nowrap}
.pill:hover{border-color:var(--gold);color:var(--txt)}
.pill.on{background:rgba(200,170,110,.1);border-color:var(--gold);color:var(--gold)}
select.ctrl-sel{padding:7px 12px;border-radius:8px;background:var(--card);border:1px solid var(--bd);color:var(--txt2);font-size:12px;outline:none;cursor:pointer}
.conf-bar{width:60px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;display:inline-block;vertical-align:middle}
.conf-fill{height:100%;border-radius:3px}
.today-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.today-card{padding:16px;border-left:3px solid var(--t-transform)}
.today-card.bug{border-left-color:var(--t-bug)}.today-card.avoid{border-left-color:var(--t-avoid)}
.today-tag{font-size:10px;color:var(--txt3);margin-bottom:6px}.today-title{font-size:14px;font-weight:600;line-height:1.4}.today-desc{font-size:12px;color:var(--txt2);margin-top:6px;line-height:1.5}
.syn-grid{display:flex;flex-direction:column;gap:16px}
.champ-group{background:var(--card);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.champ-group-hd{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(200,170,110,.05);border-bottom:1px solid var(--bd);cursor:pointer;transition:background .2s;user-select:none}
.champ-group-hd:hover{background:rgba(200,170,110,.1)}
.champ-group-hd img{width:40px;height:40px;border-radius:50%;border:2px solid var(--bd)}
.champ-group-info{flex:1;min-width:0}
.champ-group-name{font-size:14px;font-weight:600}
.champ-group-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.champ-group-tog{font-size:12px;color:var(--txt3);transition:transform .2s;padding-left:8px}
.champ-group.shut .champ-group-body,.champ-group.shut .champ-group-sub{display:none}
.champ-group.shut .champ-group-tog{transform:rotate(-90deg)}
.champ-group-body{padding:4px 0}
.syn-row{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .15s;border-left:3px solid transparent}
.syn-row:hover{background:rgba(200,170,110,.06)}
.syn-row.rp{border-left-color:var(--r-prism)}.syn-row.rg{border-left-color:var(--r-gold)}.syn-row.rs{border-left-color:var(--r-silver)}
.syn-row-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.syn-row-conf{font-size:12px;font-weight:600;color:var(--green);min-width:42px;text-align:right}
.syn-group-cnt{font-size:12px;color:var(--txt3);text-align:right;padding:2px 0 6px}
.load-more-btn{display:block;margin:16px auto 0;padding:10px 32px;background:rgba(200,170,110,.1);border:1px solid rgba(200,170,110,.25);border-radius:8px;color:var(--gold);font-size:13px;cursor:pointer;transition:.2s}
.load-more-btn:hover{background:rgba(200,170,110,.2)}
.syn-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.syn-trigger{font-size:12px;color:var(--txt3)}
.syn-expand{padding:10px 18px;border-top:1px solid var(--bd);font-size:12px;color:var(--gold);cursor:pointer;text-align:center;transition:.2s}
.syn-expand:hover{background:rgba(200,170,110,.05)}
.syn-detail{display:none;padding:16px 18px;border-top:1px solid var(--bd);background:rgba(0,0,0,.15)}
.syn-detail.open{display:block}
.syn-detail-notes{margin-top:12px}.syn-detail-notes .note{padding:8px 12px;background:var(--card);border-radius:8px;margin-bottom:6px;font-size:12px;color:var(--txt2)}.syn-detail-notes .note b{color:var(--gold);font-weight:600}
.syn-detail-combos{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}.syn-detail-combos .combo-tag{padding:4px 10px;border-radius:6px;background:rgba(200,170,110,.08);border:1px solid rgba(200,170,110,.15);font-size:11px;color:var(--gold)}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.hero-card{padding:18px;cursor:pointer;text-align:center}.hero-card:hover{transform:translateY(-2px);border-color:var(--gold)}
.hero-card img{width:56px;height:56px;border-radius:10px;border:2px solid var(--bd);margin-bottom:10px}
.hero-card .hname{font-size:15px;font-weight:600}.hero-card .htitle{font-size:11px;color:var(--txt3);margin-bottom:8px}
.hero-card .hstats{display:flex;justify-content:center;gap:16px;font-size:12px;color:var(--txt2);margin-bottom:10px}
.hero-card .hsyn{font-size:11px;color:var(--txt3);display:flex;justify-content:center;gap:6px}.hero-card .hsyn .cnt{font-weight:600}
.data-filter-bar{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}.hero-info-bar{font-size:12px;color:var(--txt3);margin:10px 0 4px;text-align:right}.hero-empty{grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--txt3);font-size:14px}
.cnt-t{color:var(--t-transform)}.cnt-r{color:var(--t-recommend)}.cnt-a{color:var(--t-avoid)}.cnt-b{color:var(--t-bug)}
.aug-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.aug-card{padding:18px;cursor:pointer;border-top:3px solid var(--bd)}.aug-card.silver{border-top-color:var(--r-silver)}.aug-card.gold{border-top-color:var(--r-gold)}.aug-card.prism{border-top-color:var(--r-prism)}
.aug-card:hover{transform:translateY(-2px);border-color:var(--gold)}
.aug-name{font-size:15px;font-weight:600;margin-bottom:4px}.aug-stats{display:flex;gap:14px;font-size:12px;color:var(--txt2);margin-bottom:8px}
.aug-desc{font-size:12px;color:var(--txt3);line-height:1.5;margin-bottom:10px}
.aug-best{font-size:11px;color:var(--txt2)}.aug-best b{color:var(--t-recommend);font-weight:600}
.aug-avoid{font-size:11px;color:var(--txt2);margin-top:4px}.aug-avoid b{color:var(--t-avoid);font-weight:600}
.submit-toggle{padding:12px 24px;border-radius:10px;background:linear-gradient(135deg,rgba(200,170,110,.15),rgba(200,170,110,.05));border:1px solid rgba(200,170,110,.3);color:var(--gold);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:16px;transition:.2s;width:100%}
.submit-toggle:hover{background:linear-gradient(135deg,rgba(200,170,110,.25),rgba(200,170,110,.1))}
.submit-form{display:none;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:20px}.submit-form.open{display:block}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}.form-group label{font-size:12px;color:var(--txt3)}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--txt);font-size:13px;outline:none}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold)}
.form-stars{display:flex;gap:4px;font-size:20px;cursor:pointer;color:var(--txt3)}.form-stars span.on{color:var(--r-gold)}
.form-submit{padding:10px 28px;border-radius:8px;background:var(--gold);color:var(--bg);font-weight:600;border:none;cursor:pointer;font-size:13px;margin-top:4px}
.form-submit:hover{background:var(--gold2)}
.form-success{display:none;padding:14px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.15);border-radius:8px;color:var(--t-bug);font-size:13px;margin-bottom:16px;text-align:center}
.report-list{display:flex;flex-direction:column;gap:12px}
.report-card{padding:18px}
.report-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.report-author{font-size:13px;font-weight:600;color:var(--gold)}.report-stars{color:var(--r-gold);font-size:13px}
.report-body{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.report-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.report-actions{display:flex;gap:16px;font-size:13px;color:var(--txt3)}.report-actions span{cursor:pointer;transition:.2s}.report-actions span:hover{color:var(--gold)}
.issue-list{display:flex;flex-direction:column;gap:12px}
.issue-card{padding:18px;border-left:3px solid var(--t-bug)}.issue-card.critical{border-left-color:var(--red)}.issue-card.major{border-left-color:var(--t-bug)}.issue-card.minor{border-left-color:var(--blue)}
.issue-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.issue-sev{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600}
.issue-sev.critical{background:rgba(248,113,113,.15);color:var(--red)}.issue-sev.major{background:rgba(251,191,36,.12);color:var(--t-bug)}.issue-sev.minor{background:rgba(59,130,246,.12);color:var(--blue)}
.issue-title{font-size:15px;font-weight:600}
.issue-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.issue-meta{display:flex;gap:14px;font-size:12px;color:var(--txt3);flex-wrap:wrap}
.issue-tip{margin-top:10px;padding:10px 14px;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12);border-radius:8px;font-size:12px;color:var(--t-bug);line-height:1.5}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}.modal-bg.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;width:92%;max-width:700px;max-height:85vh;overflow-y:auto;padding:24px}
.modal-x{float:right;background:none;border:none;color:var(--txt3);font-size:20px;cursor:pointer}.modal-x:hover{color:var(--txt)}
.m-hero-head{display:flex;align-items:center;gap:16px;margin-bottom:20px}.m-hero-head img{width:56px;height:56px;border-radius:10px;border:2px solid var(--bd)}
.m-hero-name{font-size:22px;font-weight:700}.m-hero-sub{font-size:12px;color:var(--txt3)}
.m-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.m-stat{background:var(--card);border-radius:8px;padding:12px;text-align:center}.m-stat-label{font-size:10px;color:var(--txt3);text-transform:uppercase}.m-stat-val{font-size:20px;font-weight:700;margin-top:2px}
.m-section{margin-bottom:18px}
.m-section-title{font-size:14px;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px}
.m-syn-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:8px;margin-bottom:6px}
.m-syn-name{flex:1;font-size:13px;font-weight:500}.m-syn-delta{font-size:14px;font-weight:700}
.m-aug-trigger{font-size:12px;color:var(--txt3);margin-bottom:12px;line-height:1.6;padding:10px 14px;background:var(--card);border-radius:8px}
.m-aug-test{padding:10px 14px;background:var(--card);border-radius:8px;margin-bottom:6px;font-size:12px;color:var(--txt2)}.m-aug-test b{color:var(--gold)}.test-ok{color:var(--green)}.test-no{color:var(--red)}
.mvp-banner{background:linear-gradient(90deg,rgba(251,191,36,.12),rgba(200,170,110,.08));border-bottom:1px solid rgba(251,191,36,.2);padding:10px 24px;text-align:center;font-size:12px;color:var(--t-bug);line-height:1.5}
.ext-link{display:inline-block;padding:10px 24px;border-radius:8px;background:rgba(200,170,110,.1);border:1px solid rgba(200,170,110,.25);color:var(--gold);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:.2s;margin-top:8px}
.ext-link:hover{background:rgba(200,170,110,.2);border-color:var(--gold)}
.cand-list{display:flex;flex-direction:column;gap:12px}
.cand-card{padding:18px;border-left:3px solid var(--t-bug)}
.cand-card.synergy{border-left-color:var(--t-transform)}
.cand-card.trap{border-left-color:var(--t-avoid)}
.cand-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.cand-type{padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600}
.cand-type.bug{background:rgba(251,191,36,.15);color:var(--t-bug)}
.cand-type.syn{background:rgba(255,107,53,.12);color:var(--t-transform)}
.cand-type.trap{background:rgba(248,113,113,.12);color:var(--t-avoid)}
.cand-title{font-size:15px;font-weight:600}
.cand-body{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:10px}
.cand-meta{display:flex;gap:14px;font-size:12px;color:var(--txt3);flex-wrap:wrap}
.cand-evidence{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}
.cand-evidence a{font-size:11px;color:var(--blue);text-decoration:none;padding:3px 8px;background:rgba(59,130,246,.08);border-radius:4px}
.cand-evidence a:hover{text-decoration:underline}
.cand-empty{text-align:center;padding:60px 20px;color:var(--txt3);font-size:14px}
.changelog-section{margin-bottom:20px}
.changelog-title{font-size:14px;font-weight:600;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.changelog-list{display:flex;flex-direction:column;gap:6px}
.changelog-item{padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.changelog-item .cl-type{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.changelog-item .cl-type.bug{background:rgba(251,191,36,.12);color:var(--t-bug)}
.changelog-item .cl-type.synergy{background:rgba(255,107,53,.1);color:var(--t-transform)}
.changelog-item .cl-title{flex:1;min-width:120px;font-weight:500;color:var(--txt)}
.changelog-item .cl-meta{font-size:11px;color:var(--txt3);display:flex;gap:8px;flex-wrap:wrap}
.changelog-empty{font-size:12px;color:var(--txt3);text-align:center;padding:12px}
.cand-header-note{font-size:12px;color:var(--t-bug);background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.12);border-radius:8px;padding:10px 16px;margin-bottom:16px;text-align:center}
footer{text-align:center;padding:28px;font-size:11px;color:var(--txt3);border-top:1px solid var(--bd);margin-top:36px}
@media(max-width:1024px){.today-row{grid-template-columns:1fr}.syn-grid{grid-template-columns:1fr}.hero-grid{grid-template-columns:repeat(3,1fr)}.aug-grid{grid-template-columns:repeat(2,1fr)}.m-stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){.tabs{display:none}.hero-grid{grid-template-columns:repeat(2,1fr)}.aug-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}}
/* 增强图鉴 v2 */
.aug-card2{padding:0;overflow:hidden;cursor:pointer;transition:.2s}.aug-card2:hover{transform:translateY(-2px);border-color:var(--gold)}
.aug-card2 .aug2-top{border-top:3px solid var(--bd);padding:16px 18px 12px}
.aug-card2.silver .aug2-top{border-top-color:var(--r-silver)}.aug-card2.gold .aug2-top{border-top-color:var(--r-gold)}.aug-card2.prismatic .aug2-top{border-top-color:var(--r-prism)}.aug-card2.prism .aug2-top{border-top-color:var(--r-prism)}
.aug2-name{font-size:16px;font-weight:700;margin-bottom:2px}.aug2-en{font-size:11px;color:var(--txt3);margin-bottom:8px}
.aug2-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.aug2-tag{padding:2px 7px;border-radius:4px;font-size:10px;background:rgba(255,255,255,.05);color:var(--txt3);border:1px solid rgba(255,255,255,.06)}
.aug2-effect{font-size:12px;color:var(--txt2);line-height:1.5;margin-bottom:6px}
.aug2-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.b-active{background:rgba(74,222,128,.12);color:var(--green)}.b-removed{background:rgba(248,113,113,.12);color:var(--t-avoid)}.b-unknown-s{background:rgba(156,163,175,.08);color:var(--txt3)}
.b-prototype{background:rgba(251,191,36,.12);color:var(--t-bug);font-size:10px;padding:2px 6px;border-radius:4px;border:1px solid rgba(251,191,36,.2)}

.aug2-rec-item{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;margin:2px;border-radius:6px;font-size:11px;background:rgba(255,255,255,.04);border:1px solid var(--bd)}
.aug2-rec-grade{width:16px;height:16px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.grade-T0{background:rgba(239,68,68,.18);color:#ef4444}.grade-T1{background:rgba(59,130,246,.15);color:#60a5fa}.grade-T2{background:rgba(20,184,166,.12);color:#2dd4bf}
.aug2-expand{padding:8px 18px;border-top:1px solid var(--bd);font-size:11px;color:var(--gold);cursor:pointer;text-align:center;transition:.2s}
.aug2-expand:hover{background:rgba(200,170,110,.05)}
</style>

<script>
/* ===== Data: loaded from JSON files via fetch() ===== */
let CK={},SYN=[],HEROES=[],AUGS=[],REPORTS=[],ISSUES=[],CAND_BUGS=[],CAND_SYNS=[],CHANGELOG=[],CHAMP_RECS={},HERO_RECS={};
function img(n){return `https://ddragon.leagueoflegends.com/cdn/15.12.1/img/champion/${CK[n]||n}.png`}

/* ===== Label / Class Maps ===== */
let tierF='all',rarF='all',roleF='all',augRF='all',augStF='all',dataF='all',heroTierF='all';
const TL={transform:'质变',recommend:'推荐',avoid:'避雷',bug:'疑似Bug'};
const TC={transform:'b-transform',recommend:'b-recommend',avoid:'b-avoid',bug:'b-bug'};
const RL={silver:'白银',gold:'黄金',prism:'棱彩',prismatic:'棱彩',unknown:'未知'};
const RC={silver:'b-silver',gold:'b-gold',prism:'b-prism',prismatic:'b-prism',unknown:''};
const RI={prismatic:'💎',gold:'🔶',silver:'⬜'};const RCOL={prismatic:'var(--r-prism)',gold:'var(--r-gold)',silver:'var(--r-silver)'};
const AUG_SL={active:'活跃',removed:'已移除',unknown:'未知'};
const AUG_SC={active:'b-active',removed:'b-removed',unknown:'b-unknown-s'};
const GM={S:'T0',A:'T1',B:'T2'};const GO={S:0,A:1,B:2};
function fz(q,t){if(!q)return true;if(t.includes(q))return true;let i=0;for(const c of t){if(c===q[i])i++;if(i===q.length)return true}return false}
const heroAliasMap={};
function matchH(q,name){if(!q)return true;if(fz(q,name.toLowerCase()))return true;const aliases=heroAliasMap[name]||[];return aliases.some(a=>fz(q,a.toLowerCase()))}
let synLimit=12;
const SL={data:'数据分析',community:'社区投稿',manual:'人工标注',blitz_gg:'blitz.gg'};
const SC={data:'b-src-data',community:'b-src-comm',manual:'b-src-manual',blitz_gg:'b-src-data'};
const STL={verified:'已验证 ✓',community:'社区验证中',disputed:'争议',investigating:'调查中 🔍'};
const STC={verified:'b-verified',community:'b-community',disputed:'b-disputed',investigating:'b-investigating'};
function cCol(c){return c>=80?'var(--green)':c>=60?'var(--t-bug)':'var(--red)'}
function cBar(c){return `<span class="conf-bar"><span class="conf-fill" style="width:${c}%;background:${cCol(c)}"></span></span>`}

/* ===== Render Functions ===== */
function renderToday(){document.getElementById('todayRow').innerHTML=''}

function renderSyn(){const q=document.getElementById('synSearch').value.toLowerCase(),s=document.getElementById('synSort').value;let l=SYN.filter(x=>(!q||matchH(q,x.hero)||fz(q,x.aug.toLowerCase()))&&(tierF==='all'||x.tier===tierF)&&(rarF==='all'||x.rar===rarF));if(s==='conf')l.sort((a,b)=>b.conf-a.conf);else l.sort((a,b)=>(a.hero.localeCompare(b.hero))||(a.conf-b.conf));const gMap=new Map();l.forEach(x=>{if(!gMap.has(x.hero))gMap.set(x.hero,[]);gMap.get(x.hero).push(x)});const gAll=[...gMap.entries()];const gShow=gAll.slice(0,synLimit);const hasMore=gAll.length>synLimit;const rC={prismatic:'rp',prism:'rp',gold:'rg',silver:'rs'};let html='';html+='<div class="syn-group-cnt">'+l.length+' 个组合 · '+gAll.length+' 位英雄</div>';if(!l.length){html+='<div class="hero-empty">暂无符合条件的组合。</div>'}else{gShow.forEach(([hero,syns])=>{const tc={transform:0,recommend:0,avoid:0,bug:0};syns.forEach(x=>tc[x.tier]++);const parts=[];if(tc.transform)parts.push('<span style="color:var(--t-transform)">'+tc.transform+'质变</span>');if(tc.recommend)parts.push('<span style="color:var(--t-recommend)">'+tc.recommend+'推荐</span>');if(tc.avoid)parts.push('<span style="color:var(--t-avoid)">'+tc.avoid+'避雷</span>');if(tc.bug)parts.push('<span style="color:var(--t-bug)">'+tc.bug+'Bug</span>');html+='<div class="champ-group shut" id="cg_'+hero+'"><div class="champ-group-hd" onclick="this.parentElement.classList.toggle(\'shut\')"><img src="'+img(hero)+'" onerror="this.style.display=\'none\'"><div class="champ-group-info"><div class="champ-group-name">'+hero+'</div><div class="champ-group-sub">'+parts.join(' · ')+' · '+syns.length+'条</div></div><div class="champ-group-tog">▼</div></div><div class="champ-group-body">';syns.forEach(x=>{html+='<div class="syn-row '+((rC[x.rar])||'')+'" onclick="openAug(\''+x.aug.replace(/'/g,"\\'")+'\')"><span class="badge '+TC[x.tier]+'" style="font-size:10px">'+TL[x.tier]+'</span><span class="badge '+(RC[x.rar]||'')+'" style="font-size:10px">'+(RL[x.rar]||x.rar)+'</span><span class="syn-row-name">'+x.aug+'</span><span class="syn-row-conf">'+x.conf+'%</span></div>'});html+='</div></div>'});if(hasMore){html+='<button class="load-more-btn" onclick="synLimit+=12;renderSyn()">加载更多 ('+gAll.length+' 位英雄)</button>'}}document.getElementById('synGrid').innerHTML=html}
function toggleD(i){const e=document.getElementById('sd'+i);e.classList.toggle('open');e.previousElementSibling.textContent=e.classList.contains('open')?'收起详情 ▲':'展开详情 ▼'}

function renderHeroes(){const q=document.getElementById('heroSearch').value.toLowerCase();const synH=new Set(SYN.map(s=>s.hero));const bugH=new Set(SYN.filter(s=>s.tier==='bug').map(s=>s.hero));ISSUES.forEach(i=>(i.heroes||[]).forEach(h=>bugH.add(h)));let l=HEROES.filter(h=>{if(q&&!matchH(q,h.name))return false;if(roleF!=='all'&&h.role!==roleF)return false;if(heroTierF!=='all'&&h.tier!==heroTierF)return false;if(dataF==='hasSyn'&&!synH.has(h.name))return false;if(dataF==='hasBug'&&!bugH.has(h.name))return false;if(dataF==='unrated'&&h.tier!=='unknown')return false;return true});document.getElementById('heroInfo').textContent='\u663E\u793A '+l.length+' / '+HEROES.length+' \u4F4D\u82F1\u96C4';document.getElementById('heroGrid').innerHTML=l.length?l.sort((a,b)=>(b.pr||0)-(a.pr||0)).map(h=>{const ss=SYN.filter(s=>s.hero===h.name),c={transform:0,recommend:0,avoid:0,bug:0};ss.forEach(s=>c[s.tier]++);const recN=(HERO_RECS[h.name]||[]).length;return`<div class="card hero-card" onclick="openHero('${h.name}')"><img src="${img(h.name)}" onerror="this.style.display='none'"><div class="hname">${h.name}</div><div class="htitle">${h.title}</div><div style="margin-bottom:6px"><span class="b-tier tier-${h.tier}">${h.tier==='unknown'?'未评级':h.tier}</span> <span class="b-role">${h.role}</span></div><div class="hstats">${h.wr!=null?`<span style="color:var(--green)">${h.wr}%</span><span>${h.pr}% 选取</span>`:'<span style="color:var(--txt3)">暂无真实统计</span>'}</div><div class="hsyn">${recN?`<span class="cnt-r"><span class="cnt">${recN}</span>推荐强化</span>`:''}</div></div>`}).join(''):'<div class="hero-empty">暂无符合条件的英雄。</div>'}

function renderAugs(){const q=document.getElementById('augSearch').value.toLowerCase();let l=AUGS.filter(a=>{if(q){const inName=fz(q,a.name.toLowerCase());const inEn=fz(q,(a.name_en||'').toLowerCase());const inAlias=(a.aliases||[]).some(x=>typeof x==='string'&&fz(q,x.toLowerCase()));const inTag=(a.tags||[]).some(x=>typeof x==='string'&&fz(q,x.toLowerCase()));const inEff=fz(q,(a.effect||'').toLowerCase());if(!inName&&!inEn&&!inAlias&&!inTag&&!inEff)return false}const tierVal=a.tier||a.rar||'unknown';const statusVal=a.status||'unknown';if(augRF!=='all'&&tierVal!==augRF&&a.rar!==augRF)return false;if(augStF!=='all'&&statusVal!==augStF)return false;return true});document.getElementById('augGrid').innerHTML=l.length?l.map((a,idx)=>{const tierVal=a.tier||a.rar||'unknown';const statusVal=a.status||'unknown';const effectVal=a.effect||a.desc||'';const tags=a.tags||[];const rarClass=(tierVal==='prismatic'?'prism':tierVal);return`<div class="card aug-card2 ${rarClass}"><div class="aug2-top"><div class="aug2-name">${a.name}${a.source_status==="prototype"?'<span class="badge b-prototype" style="margin-left:6px">原型</span>':''}</div><div class="aug2-en">${a.name_en||''}</div><div class="aug2-badges"><span class="badge ${RC[tierVal]||''}">${RL[tierVal]||tierVal}</span><span class="badge ${AUG_SC[statusVal]||'b-unknown-s'}">${AUG_SL[statusVal]||statusVal}</span>${a.win_rate!=null?`<span style="font-size:11px;color:var(--green)">${a.win_rate}%</span>`:''}${a.pick_rate!=null?`<span style="font-size:11px;color:var(--txt3)">${a.pick_rate}% 选取</span>`:''}</div>${tags.length?`<div class="aug2-tags" style="margin-top:6px">${tags.map(t=>`<span class="aug2-tag">${t}</span>`).join('')}</div>`:''}<div class="aug2-effect">${effectVal?effectVal.slice(0,80)+(effectVal.length>80?'...':''):'<span style="color:var(--txt3)">暂无效果描述</span>'}</div></div><div class="aug2-expand" onclick="toggleAugDetail(${idx},event)">展开详情 ▼</div><div class="aug2-detail" id="augD${idx}"><div class="aug2-detail-row"><span class="aug2-detail-label">ID</span><span class="aug2-detail-val">${a.id||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">中文名</span><span class="aug2-detail-val">${a.name}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">英文名</span><span class="aug2-detail-val">${a.name_en||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">别名</span><span class="aug2-detail-val">${(a.aliases||[]).join(', ')||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">稀有度</span><span class="aug2-detail-val"><span class="badge ${RC[tierVal]||''}">${RL[tierVal]||tierVal}</span></span></div><div class="aug2-detail-row"><span class="aug2-detail-label">状态</span><span class="aug2-detail-val"><span class="badge ${AUG_SC[statusVal]||'b-unknown-s'}">${AUG_SL[statusVal]||statusVal}</span></span></div><div class="aug2-detail-row"><span class="aug2-detail-label">来源状态</span><span class="aug2-detail-val">${a.source_status==="prototype"?'<span class="badge b-prototype">原型</span>':a.source_status||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">效果</span><span class="aug2-detail-val">${a.effect||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">效果 (EN)</span><span class="aug2-detail-val">${a.effect_en||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">标签</span><span class="aug2-detail-val">${tags.length?tags.join(', '):'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">加入版本</span><span class="aug2-detail-val">${a.patch_added||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">移除版本</span><span class="aug2-detail-val">${a.patch_removed||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">来源</span><span class="aug2-detail-val">${a.source?JSON.stringify(a.source):'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">备注</span><span class="aug2-detail-val">${a.notes||'—'}</span></div>${(CHAMP_RECS[a.id]&&CHAMP_RECS[a.id].length)?`<div class="aug2-recs"><div class="aug2-recs-title">🏆 英雄推荐 (blitz.gg)</div>${[...CHAMP_RECS[a.id]].sort((a,b)=>(GO[a.grade]??9)-(GO[b.grade]??9)).map(r=>`<span class="aug2-rec-item" style="cursor:pointer" onclick="openHero('${r.h}')"><span class="aug2-rec-grade grade-${GM[r.grade]||r.grade}">${GM[r.grade]||r.grade}</span><span>${r.h}</span><span style="color:${RCOL[r.rarity]||'var(--txt3)'};font-size:10px">${({prismatic:'棱彩',gold:'金',silver:'银'})[r.rarity]||r.rarity}</span></span>`).join('')}</div>`:''}</div></div>`}).join(''):'<div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--txt3)">暂无符合条件的增强。</div>'}

|r.rarity}</span></span>`).join('')}</div></div>`:''}`;document.getElementById('modalBg').classList.add('on')}

/* ===== Data Loading via fetch() ===== */
async function loadData(){
  try{
    const [cRes,aRes,sRes,rRes,iRes]=await Promise.all([
      fetch('data/champions.json'),
      fetch('data/augments.json'),
      fetch('data/synergies.json'),
      fetch('data/reports.json'),
      fetch('data/issues.json')
    ]);
    const cData=await cRes.json();
    CK=cData.championKeys||{};
    HEROES=cData.champions||[];
    HEROES.forEach(h=>{if(h.aliases&&h.aliases.length)heroAliasMap[h.name]=h.aliases});
    AUGS=await aRes.json();
    SYN=await sRes.json();
    REPORTS=await rRes.json();
    ISSUES=await iRes.json();
    renderToday();renderSyn();renderHeroes();renderAugs();renderReports();renderIssues();renderCandidates();populateFormDropdowns();
    /* 加载 meta.json 更新版本信息 */
    fetch('data/meta.json').then(r=>r.json()).then(m=>{
      const el=document.getElementById('verInfo');if(!el)return;
      const t=new Date(m.last_updated),now=new Date(),d=Math.floor((now-t)/1e3);
      let ago;
      if(d<60)ago='刚刚';else if(d<3600)ago=Math.floor(d/60)+'分钟前';
      else if(d<86400)ago=Math.floor(d/3600)+'小时前';
      else if(d<604800)ago=Math.floor(d/86400)+'天前';
      else ago=t.toLocaleDateString('zh-CN');
      const st=m.stats||{};
      const parts=[];
      if(st.champions)parts.push(st.champions+'英雄');
      if(st.augments)parts.push(st.augments+'增强');
      if(st.synergies)parts.push(st.synergies+'组合');
      el.textContent='v'+(m.patch||'26.12')+' · 数据更新于 '+ago+(parts.length?' · '+parts.join(' / '):'');
    }).catch(()=>{});
  }catch(e){
    console.error('数据加载或渲染失败:',e);
    document.querySelector('.wrap').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--txt3)"><h2 style="color:var(--t-bug);margin-bottom:12px">数据加载或渲染失败，请查看 Console 具体报错。</h2><p>请确保项目通过 HTTP 服务器访问（如 <code>python -m http.server</code>），而非直接打开文件。</p></div>';
    return;
  }
  // Load candidate data (may not exist if pipeline hasn't run)
  try{
    const [cbRes,csRes]=await Promise.allSettled([
      fetch('pipeline/output/candidate_bugs.json'),
      fetch('pipeline/output/candidate_synergies.json')
    ]);
    if(cbRes.status==='fulfilled'&&cbRes.value.ok) CAND_BUGS=await cbRes.value.json();
    if(csRes.status==='fulfilled'&&csRes.value.ok) CAND_SYNS=await csRes.value.json();
  }catch(e){/* pipeline output not available */}
  renderCandidates();
  // Load changelog (optional, may not exist yet)
  try{
    const clRes=await fetch('data/changelog.json');
    if(clRes.ok) CHANGELOG=await clRes.json();
  }catch(e){/* changelog not available */}
  renderChangelog();
  // Load champion-augment recommendations from blitz.gg (optional)
  try{
    const crRes=await fetch('data/champion_recs.json');
    if(crRes.ok){const crData=await crRes.json();CHAMP_RECS=crData.data||{};
      // Build inverse map: champion name → [{augment_id, rarity, grade}, ...]
      for(const [augId, recs] of Object.entries(CHAMP_RECS)){
        for(const r of recs){
          if(!HERO_RECS[r.h])HERO_RECS[r.h]=[];
          HERO_RECS[r.h].push({id:augId,rarity:r.rarity,grade:r.grade});
        }
      }
    }
  }catch(e){/* champion recs not available */}
  renderAugs();
}
loadData();
</script>
