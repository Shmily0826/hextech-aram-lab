<script>
/* ===== Data: loaded from JSON files via fetch() ===== */
let CK={},SYN=[],HEROES=[],AUGS=[],ISSUES=[],CHAMP_RECS={},HERO_RECS={},AUG_WR={};
let CDN_VER='16.12.1';
function img(n){return `https://ddragon.leagueoflegends.com/cdn/${CDN_VER}/img/champion/${CK[n]||n}.png`}

/* ===== Label / Class Maps ===== */
let tierF='all',rarF='all',eliteF=false,roleF='all',augRF='all',augStF='all',heroTierF='all';
const TL={transform:'质变',recommend:'推荐',avoid:'避雷',bug:'疑似Bug'};
const TC={transform:'b-transform',recommend:'b-recommend',avoid:'b-avoid',bug:'b-bug'};
const RL={silver:'白银',gold:'黄金',prism:'棱彩',prismatic:'棱彩',unknown:'未知'};
const RC={silver:'b-silver',gold:'b-gold',prism:'b-prism',prismatic:'b-prism',unknown:''};
const RI={prismatic:'💎',gold:'🔶',silver:'⬜'};const RCOL={prismatic:'var(--r-prism)',gold:'var(--r-gold)',silver:'var(--r-silver)'};
const AUG_SL={active:'活跃',removed:'已移除',unknown:'未知'};
const AUG_SC={active:'b-active',removed:'b-removed',unknown:'b-unknown-s'};
const GM={S:'T0',A:'T1',B:'T2'};const GO={S:0,A:1,B:2};
function fz(q,t){if(!q)return true;if(t.includes(q))return true;let i=0;for(const c of t){if(c===q[i])i++;if(i===q.length)return true}return false}
const heroAliasMap={};
function matchH(q,name){if(!q)return true;if(fz(q,name.toLowerCase()))return true;const aliases=heroAliasMap[name]||[];return aliases.some(a=>fz(q,a.toLowerCase()))}
let synLimit=12;
const SL={data:'数据分析',community:'社区投稿',manual:'人工标注',blitz_gg:'blitz.gg'};
const SC={data:'b-src-data',community:'b-src-comm',manual:'b-src-manual',blitz_gg:'b-src-data'};
const STL={verified:'已验证 ✓',community:'社区验证中',disputed:'争议',investigating:'调查中 🔍'};
const STC={verified:'b-verified',community:'b-community',disputed:'b-disputed',investigating:'b-investigating'};
function cCol(c){return c>=80?'var(--green)':c>=60?'var(--t-bug)':'var(--red)'}
function cBar(c){return `<span class="conf-bar"><span class="conf-fill" style="width:${c}%;background:${cCol(c)}"></span></span>`}

/* ===== Render Functions ===== */
function renderSyn(){const q=document.getElementById('synSearch').value.toLowerCase(),s=document.getElementById('synSort').value;let l=SYN.filter(x=>(!q||matchH(q,x.h)||fz(q,x.a.toLowerCase()))&&(tierF==='all'||x.t===tierF)&&(rarF==='all'||x.r===rarF)&&(!eliteF||(AUG_WR[x.a]||0)>=52));if(s==='wr')l.sort((a,b)=>(AUG_WR[b.a]||0)-(AUG_WR[a.a]||0));else l.sort((a,b)=>(a.h.localeCompare(b.h))||((AUG_WR[b.a]||0)-(AUG_WR[a.a]||0)));const gMap=new Map();l.forEach(x=>{if(!gMap.has(x.h))gMap.set(x.h,[]);gMap.get(x.h).push(x)});const gAll=[...gMap.entries()];const gShow=gAll.slice(0,synLimit);const hasMore=gAll.length>synLimit;const rC={prismatic:'rp',prism:'rp',gold:'rg',silver:'rs'};let html='';const eCnt=eliteF?l.length:0;html+='<div class="syn-group-cnt">'+l.length+' 个组合 · '+gAll.length+' 位英雄'+(eliteF?' · 精选模式':'')+'</div>';if(!l.length){html+='<div class="hero-empty">暂无符合条件的组合。</div>'}else{gShow.forEach(([hero,syns])=>{const tc={transform:0,recommend:0,avoid:0,bug:0};syns.forEach(x=>tc[x.t]++);const parts=[];if(tc.transform)parts.push('<span style="color:var(--t-transform)">'+tc.transform+'质变</span>');if(tc.recommend)parts.push('<span style="color:var(--t-recommend)">'+tc.recommend+'推荐</span>');if(tc.avoid)parts.push('<span style="color:var(--t-avoid)">'+tc.avoid+'避雷</span>');if(tc.bug)parts.push('<span style="color:var(--t-bug)">'+tc.bug+'Bug</span>');html+='<div class="champ-group shut" id="cg_'+hero+'"><div class="champ-group-hd" onclick="this.parentElement.classList.toggle(\'shut\')"><img src="'+img(hero)+'" onerror="this.style.display=\'none\'"><div class="champ-group-info"><div class="champ-group-name">'+hero+'</div><div class="champ-group-sub">'+parts.join(' · ')+' · '+syns.length+'条</div></div><div class="champ-group-tog">▼</div></div><div class="champ-group-body">';syns.forEach(x=>{const wr=AUG_WR[x.a];const wrCls=wr!=null?(wr>=52?'wr-hi':wr>=48?'wr-md':'wr-lo'):'wr-na';const wrTxt=wr!=null?wr+'%':'--';html+='<div class="syn-row '+((rC[x.r])||'')+'" onclick="openAug(\''+x.a.replace(/'/g,"\\'")+'\')"><span class="badge '+TC[x.t]+'" style="font-size:10px">'+TL[x.t]+'</span><span class="badge '+(RC[x.r]||'')+'" style="font-size:10px">'+(RL[x.r]||x.r)+'</span><span class="syn-row-name">'+x.a+'</span><span class="syn-row-wr '+wrCls+'">'+wrTxt+'</span></div>'});html+='</div></div>'});if(hasMore){html+='<button class="load-more-btn" onclick="synLimit+=12;renderSyn()">加载更多 ('+gAll.length+' 位英雄)</button>'}}document.getElementById('synGrid').innerHTML=html}
function toggleD(i){const e=document.getElementById('sd'+i);e.classList.toggle('open');e.previousElementSibling.textContent=e.classList.contains('open')?'收起详情 ▲':'展开详情 ▼'}

function renderHeroes(){const q=document.getElementById('heroSearch').value.toLowerCase();let l=HEROES.filter(h=>{if(q&&!matchH(q,h.name))return false;if(roleF!=='all'&&h.role!==roleF)return false;if(heroTierF!=='all'&&h.tier!==heroTierF)return false;return true});document.getElementById('heroInfo').textContent='\u663E\u793A '+l.length+' / '+HEROES.length+' \u4F4D\u82F1\u96C4';document.getElementById('heroGrid').innerHTML=l.length?l.sort((a,b)=>(b.pr||0)-(a.pr||0)).map(h=>{const ss=SYN.filter(s=>s.h===h.name),c={transform:0,recommend:0,avoid:0,bug:0};ss.forEach(s=>c[s.t]++);const recN=(HERO_RECS[h.name]||[]).length;return`<div class="card hero-card" onclick="openHero('${h.name}')"><img src="${img(h.name)}" onerror="this.style.display='none'"><div class="hname">${h.name}</div><div class="htitle">${h.title}</div><div style="margin-bottom:6px"><span class="b-tier tier-${h.tier}">${h.tier==='unknown'?'未评级':h.tier}</span> <span class="b-role">${h.role}</span></div><div class="hstats">${h.wr!=null?`<span style="color:var(--green)">${h.wr}%</span><span>${h.pr}% 选取</span>`:'<span style="color:var(--txt3)">暂无真实统计</span>'}</div><div class="hsyn">${recN?`<span class="cnt-r"><span class="cnt">${recN}</span>推荐海克斯</span>`:''}</div></div>`}).join(''):'<div class="hero-empty">暂无符合条件的英雄。</div>'}

function renderAugs(){const q=document.getElementById('augSearch').value.toLowerCase();let l=AUGS.filter(a=>{if(q){const inName=fz(q,a.name.toLowerCase());const inEn=fz(q,(a.name_en||'').toLowerCase());const inAlias=(a.aliases||[]).some(x=>typeof x==='string'&&fz(q,x.toLowerCase()));const inTag=(a.tags||[]).some(x=>typeof x==='string'&&fz(q,x.toLowerCase()));const inEff=fz(q,(a.effect||'').toLowerCase())||fz(q,(a.effect_en||'').toLowerCase());if(!inName&&!inEn&&!inAlias&&!inTag&&!inEff)return false}const tierVal=a.tier||a.rar||'unknown';const statusVal=a.status||'unknown';if(augRF!=='all'&&tierVal!==augRF&&a.rar!==augRF)return false;if(augStF!=='all'&&statusVal!==augStF)return false;return true});document.getElementById('augGrid').innerHTML=l.length?l.map((a,idx)=>{const tierVal=a.tier||a.rar||'unknown';const statusVal=a.status||'unknown';const effectVal=a.effect||a.effect_en||a.desc||'';const isEnOnly=!a.effect&&!!a.effect_en;const tags=a.tags||[];const rarClass=(tierVal==='prismatic'?'prism':tierVal);return`<div class="card aug-card2 ${rarClass}"><div class="aug2-top"><div class="aug2-name">${a.name}${a.source_status==="prototype"?'<span class="badge b-prototype" style="margin-left:6px">原型</span>':''}</div><div class="aug2-en">${a.name_en||''}</div><div class="aug2-badges"><span class="badge ${RC[tierVal]||''}">${RL[tierVal]||tierVal}</span><span class="badge ${AUG_SC[statusVal]||'b-unknown-s'}">${AUG_SL[statusVal]||statusVal}</span>${a.win_rate!=null?`<span style="font-size:11px;color:var(--green)">${a.win_rate}%</span>`:''}${a.pick_rate!=null?`<span style="font-size:11px;color:var(--txt3)">${a.pick_rate}% 选取</span>`:''}</div>${tags.length?`<div class="aug2-tags" style="margin-top:6px">${tags.map(t=>`<span class="aug2-tag">${t}</span>`).join('')}</div>`:''}<div class="aug2-effect">${effectVal?(isEnOnly?'<span style="color:var(--txt3);font-size:10px;margin-right:4px">[EN]</span>':'')+effectVal.slice(0,80)+(effectVal.length>80?'...':''):'<span style="color:var(--txt3)">暂无效果描述</span>'}</div></div><div class="aug2-expand" onclick="toggleAugDetail(${idx},event)">展开详情 ▼</div><div class="aug2-detail" id="augD${idx}"><div class="aug2-detail-row"><span class="aug2-detail-label">ID</span><span class="aug2-detail-val">${a.id||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">中文名</span><span class="aug2-detail-val">${a.name}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">英文名</span><span class="aug2-detail-val">${a.name_en||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">别名</span><span class="aug2-detail-val">${(a.aliases||[]).join(', ')||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">稀有度</span><span class="aug2-detail-val"><span class="badge ${RC[tierVal]||''}">${RL[tierVal]||tierVal}</span></span></div><div class="aug2-detail-row"><span class="aug2-detail-label">状态</span><span class="aug2-detail-val"><span class="badge ${AUG_SC[statusVal]||'b-unknown-s'}">${AUG_SL[statusVal]||statusVal}</span></span></div><div class="aug2-detail-row"><span class="aug2-detail-label">来源状态</span><span class="aug2-detail-val">${a.source_status==="prototype"?'<span class="badge b-prototype">原型</span>':a.source_status||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">效果</span><span class="aug2-detail-val">${a.effect||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">效果 (EN)</span><span class="aug2-detail-val">${a.effect_en||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">标签</span><span class="aug2-detail-val">${tags.length?tags.join(', '):'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">加入版本</span><span class="aug2-detail-val">${a.patch_added||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">移除版本</span><span class="aug2-detail-val">${a.patch_removed||'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">来源</span><span class="aug2-detail-val">${a.source?JSON.stringify(a.source):'—'}</span></div><div class="aug2-detail-row"><span class="aug2-detail-label">备注</span><span class="aug2-detail-val">${a.notes||'—'}</span></div>${(CHAMP_RECS[a.id]&&CHAMP_RECS[a.id].length)?`<div class="aug2-recs"><div class="aug2-recs-title">🏆 英雄推荐 (blitz.gg)</div>${[...CHAMP_RECS[a.id]].sort((a,b)=>(GO[a.grade]??9)-(GO[b.grade]??9)).map(r=>`<span class="aug2-rec-item" style="cursor:pointer" onclick="openHero('${r.h}')"><span class="aug2-rec-grade grade-${GM[r.grade]||r.grade}">${GM[r.grade]||r.grade}</span><span>${r.h}</span><span style="color:${RCOL[r.rarity]||'var(--txt3)'};font-size:10px">${({prismatic:'棱彩',gold:'金',silver:'银'})[r.rarity]||r.rarity}</span></span>`).join('')}</div>`:''}</div></div>`}).join(''):'<div style="grid-column:1/-1;text-align:center;padding:48px 20px;color:var(--txt3)">暂无符合条件的海克斯。</div>'}


function renderIssues(){document.getElementById('issueList').innerHTML=ISSUES.length?ISSUES.map(b=>`<div class="card issue-card ${b.sev}"><div class="issue-head"><span class="issue-sev ${b.sev}">${b.sev==='critical'?'严重':b.sev==='major'?'重要':'轻微'}</span><span class="issue-title">${b.title}</span></div><div class="issue-desc">${b.desc}</div><div class="issue-meta">${b.heroes.map(h=>`<span class="badge b-src-comm">${h}</span>`).join('')}${b.augs.map(a=>`<span class="badge b-src-data">${a}</span>`).join('')}<span>v${b.ver}</span><span>${b.time}</span><span>${b.confirm}人确认</span><span class="badge ${STC[b.status]}">${STL[b.status]}</span>${b.confidence!=null?`<span style="font-size:11px;color:var(--txt3)">可信度 ${cBar(b.confidence)} ${b.confidence}%</span>`:''}</div>${b.tip?`<div class="issue-tip">💡 规避建议: ${b.tip}</div>`:''}</div>`).join(''):'<div style="text-align:center;padding:40px 20px;color:var(--txt3)">暂无已知问题。</div>'}



/* ===== Modal Functions ===== */
let _hsC=0;
function heroSynSec(k,items,label,icon){
  if(!items.length)return '';
  const sorted=[...items].sort((a,b)=>(AUG_WR[b.a]||0)-(AUG_WR[a.a]||0));
  const lim=k==='transform'?6:999;
  const show=sorted.slice(0,lim),rest=sorted.length-lim;
  const rows=show.map(s=>{const wr=AUG_WR[s.a];return `<div class="m-syn-row"><span class="badge ${RC[s.r]}">${RL[s.r]}</span><span class="m-syn-name">${s.a}</span><span style="font-size:11px;color:${wr!=null&&wr>=52?'#22c55e':'var(--txt3)'}">${wr!=null?wr+'%':'--'}</span><span class="badge ${STC[s.st]}" style="font-size:10px">${STL[s.st]}</span></div>`}).join('');
  let extra='';
  if(rest>0){_hsC++;extra=`<div id="hsM${_hsC}" style="display:none">${sorted.slice(lim).map(s=>{const wr=AUG_WR[s.a];return `<div class="m-syn-row"><span class="badge ${RC[s.r]}">${RL[s.r]}</span><span class="m-syn-name">${s.a}</span><span style="font-size:11px;color:${wr!=null&&wr>=52?'#22c55e':'var(--txt3)'}">${wr!=null?wr+'%':'--'}</span><span class="badge ${STC[s.st]}" style="font-size:10px">${STL[s.st]}</span></div>`}).join('')}</div><div style="text-align:center;padding:6px"><span class="hs-more" data-t="hsM${_hsC}" style="color:var(--gold);cursor:pointer;font-size:12px">展开全部 (${rest} 更多)</span></div>`}
  return `<div class="m-section"><div class="m-section-title">${icon} ${label} (${items.length})</div>${rows}${extra}</div>`;
}
function openHero(name){_hsC=0;const h=HEROES.find(x=>x.name===name);if(!h)return;const ss=SYN.filter(s=>s.h===name),g={avoid:[],bug:[]};ss.forEach(s=>{if(s.t==='avoid')g.avoid.push(s);if(s.t==='bug')g.bug.push(s)});const wIc=['🔴','🟡'],wLb=['避雷海克斯','疑似Bug'],wKs=['avoid','bug'];let sec=wKs.map((k,i)=>heroSynSec(k,g[k],wLb[i],wIc[i])).join('');const hr=HERO_RECS[name]||[];let recSec='';if(hr.length){const rG={prismatic:[],gold:[],silver:[]};hr.forEach(r=>rG[r.rarity]&&rG[r.rarity].push(r));const rL={prismatic:'棱彩',gold:'黄金',silver:'白银'},rO=['prismatic','gold','silver'];const augMap={};AUGS.forEach(a=>augMap[a.id]=a.name);const synSet=new Set(ss.map(s=>s.a));recSec='<div class="m-section"><div class="m-section-title">✨ 适配海克斯</div>';recSec+=rO.map(r=>rG[r].length?`<div style="padding:4px 14px"><div style="font-size:11px;color:${RCOL[r]||'var(--txt3)'};margin:8px 0 4px;font-weight:600">${RI[r]||'🔷'} ${rL[r]} (${rG[r].length})</div><div style="display:flex;flex-wrap:wrap;gap:4px">${rG[r].sort((a,b)=>((AUG_WR[augMap[b.id]||b.id]||0)-(AUG_WR[augMap[a.id]||a.id]||0))||((GO[a.grade]??9)-(GO[b.grade]??9))).map(a=>{const aName=augMap[a.id]||a.id;const wr=AUG_WR[aName];const wrTxt=wr!=null?wr+'%':'';const wrCol=wr!=null&&wr>=52?'#22c55e':wr!=null?'var(--txt3)':'';const verified=synSet.has(aName)?' ✓':'';return `<span class="aug2-rec-item" style="cursor:pointer" onclick="openAug('${aName}')"><span class="aug2-rec-grade grade-${GM[a.grade]||a.grade}">${GM[a.grade]||a.grade}</span><span>${aName}</span>${wrTxt?`<span style="font-size:10px;color:${wrCol}">${wrTxt}</span>`:''}${verified?`<span style="font-size:9px;color:var(--green)">✓</span>`:''}</span>`}).join('')}</div></div>`:'').join('');recSec+='</div>'}document.getElementById('modalBox').innerHTML=`<button class="modal-x" onclick="closeModal()">✕</button><div class="m-hero-head"><img src="${img(name)}" onerror="this.style.display='none'"><div><div class="m-hero-name">${h.name}</div><div class="m-hero-sub">${h.title} · <span class="b-tier tier-${h.tier}" style="display:inline-flex">${h.tier==='unknown'?'未评级':h.tier}</span> <span class="b-role">${h.role}</span></div></div></div><div class="m-stats"><div class="m-stat"><div class="m-stat-label">胜率</div><div class="m-stat-val" style="color:var(--green)">${h.wr!=null?h.wr+'%':'--'}</div></div><div class="m-stat"><div class="m-stat-label">选取率</div><div class="m-stat-val">${h.pr!=null?h.pr+'%':'--'}</div></div><div class="m-stat"><div class="m-stat-label">对局数</div><div class="m-stat-val" style="font-size:16px">${h.games!=null?h.games.toLocaleString():'--'}</div></div></div>${recSec}${sec}<div class="m-section"><div class="m-section-title">🔧 出装建议</div><div style="font-size:13px;color:var(--txt2);padding:10px 14px;background:var(--card);border-radius:8px">${h.build||'暂无出装建议'}</div></div><div class="m-section"><div class="m-section-title">💡 使用技巧</div><div style="font-size:13px;color:var(--txt2);padding:10px 14px;background:var(--card);border-radius:8px">${h.tips||'暂无海克斯大乱斗专属说明。'}</div></div>`;document.getElementById('modalBg').classList.add('on')}

function openAug(name){const a=AUGS.find(x=>x.name===name);if(!a)return;const tierVal=a.tier||a.rar||'unknown';const statusVal=a.status||'unknown';document.getElementById('modalBox').innerHTML=`<button class="modal-x" onclick="closeModal()">✕</button><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><div style="font-size:32px">✨</div><div><div style="font-size:22px;font-weight:700">${a.name}${a.source_status==="prototype"?'<span class="badge b-prototype" style="margin-left:8px;font-size:11px;vertical-align:middle">原型</span>':''}</div><div style="font-size:12px;color:var(--txt3)">${a.name_en||''}</div><div style="margin-top:4px"><span class="badge ${RC[tierVal]||''}">${RL[tierVal]||tierVal}</span> <span class="badge ${AUG_SC[statusVal]||'b-unknown-s'}">${AUG_SL[statusVal]||statusVal}</span> ${a.wr!=null?`<span style="color:var(--green)"> ${a.wr}% 胜率</span>`:''} ${a.pr!=null?`· ${a.pr}% 选取`:''}</div></div></div>${a.effect?`<div class="m-section"><div class="m-section-title">📖 效果描述</div><div style="font-size:13px;color:var(--txt2);line-height:1.6;padding:10px 14px;background:var(--card);border-radius:8px">${a.effect}</div></div>`:''}${a.effect_en?`<div class="m-section"><div class="m-section-title">📖 Effect (EN)</div><div style="font-size:13px;color:var(--txt2);line-height:1.6;padding:10px 14px;background:var(--card);border-radius:8px">${a.effect_en}</div></div>`:''}${a.desc?`<div class="m-section"><div class="m-section-title">🎮 玩法说明</div><div style="font-size:13px;color:var(--txt2);line-height:1.6;padding:10px 14px;background:var(--card);border-radius:8px">${a.desc}</div></div>`:''}${a.trigger?`<div class="m-section"><div class="m-section-title">⚡ 触发机制</div><div class="m-aug-trigger">${a.trigger}</div></div>`:''}<div class="m-section"><div class="m-section-title">📋 图鉴信息</div><div style="font-size:12px;color:var(--txt2);line-height:1.8;padding:10px 14px;background:var(--card);border-radius:8px"><div><b style="color:var(--txt3)">ID:</b> ${a.id||'—'}</div><div><b style="color:var(--txt3)">别名:</b> ${(a.aliases||[]).join(', ')||'—'}</div><div><b style="color:var(--txt3)">标签:</b> ${(a.tags||[]).join(', ')||'—'}</div><div><b style="color:var(--txt3)">加入版本:</b> ${a.patch_added||'—'}</div><div><b style="color:var(--txt3)">移除版本:</b> ${a.patch_removed||'—'}</div><div><b style="color:var(--txt3)">来源:</b> ${a.source?JSON.stringify(a.source):'—'}</div><div><b style="color:var(--txt3)">备注:</b> ${a.notes||'—'}</div></div></div>${a.best&&a.best.length?`<div class="m-section"><div class="m-section-title">🏆 最佳适配英雄</div>${a.best.map(b=>`<div class="m-syn-row"><span class="badge ${TC[b.t]}">${TL[b.t]}</span><span class="m-syn-name">${b.h}</span><span style="font-size:12px;color:var(--green)">+${(b.wr-a.wr).toFixed(1)}%</span><span style="font-size:12px;color:var(--txt3)">${b.wr}% 胜率</span></div>`).join('')}</div>`:''}${a.avoid&&a.avoid.length?`<div class="m-section"><div class="m-section-title">⛔ 不推荐英雄</div>${a.avoid.map(v=>`<div class="m-syn-row"><span class="badge b-avoid">避雷</span><span class="m-syn-name">${v.h}</span><span style="font-size:12px;color:var(--txt3);flex:1">${v.r}</span></div>`).join('')}</div>`:''}${a.tests&&a.tests.length?`<div class="m-section"><div class="m-section-title">🧪 玩家实测</div>${a.tests.map(t=>`<div class="m-aug-test"><b>${t.a}:</b> <span class="${t.ok?'test-ok':'test-no'}">${t.ok?'[已确认]':'[存疑]'}</span> ${t.t}</div>`).join('')}</div>`:''}${(CHAMP_RECS[a.id]&&CHAMP_RECS[a.id].length)?`<div class="m-section"><div class="m-section-title">🏆 英雄推荐 (blitz.gg)</div><div style="padding:8px 14px">${[...CHAMP_RECS[a.id]].sort((a,b)=>(GO[a.grade]??9)-(GO[b.grade]??9)).map(r=>`<span class="aug2-rec-item" style="margin:3px;cursor:pointer" onclick="openHero('${r.h}')"><span class="aug2-rec-grade grade-${GM[r.grade]||r.grade}">${GM[r.grade]||r.grade}</span><span style="font-size:12px">${r.h}</span><span style="color:${RCOL[r.rarity]||'var(--txt3)'};font-size:10px">${({prismatic:'棱彩',gold:'金',silver:'银'})[r.rarity]||r.rarity}</span></span>`).join('')}</div></div>`:''}`;document.getElementById('modalBg').classList.add('on')}

function closeModal(){document.getElementById('modalBg').classList.remove('on')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
document.getElementById('modalBg').addEventListener('click',e=>{const t=e.target.closest('.hs-more');if(t){const el=document.getElementById(t.dataset.t);if(el){el.style.display='block';t.parentElement.style.display='none'}}});

/* ===== Filters ===== */
function fTier(b,v){tierF=v;synLimit=12;b.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');renderSyn()}
function fRar(b,v){rarF=v;synLimit=12;b.parentElement.querySelectorAll('.rrf').forEach(p=>p.classList.remove('on'));b.classList.add('on');renderSyn()}
function fElite(b){eliteF=!eliteF;b.classList.toggle('on');synLimit=12;renderSyn()}
function fRole(b,v){roleF=v;b.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');renderHeroes()}
function fHeroTier(b,v){heroTierF=v;b.parentElement.querySelectorAll('.htf').forEach(p=>p.classList.remove('on'));b.classList.add('on');renderHeroes()}
function fAugRar(b,v){augRF=v;b.parentElement.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));b.classList.add('on');renderAugs()}
function fAugSt(b,v){augStF=v;b.parentElement.querySelectorAll('.dfp').forEach(p=>p.classList.remove('on'));b.classList.add('on');renderAugs()}
function toggleAugDetail(i,e){if(e)e.stopPropagation();const el=document.getElementById('augD'+i);el.classList.toggle('open');el.previousElementSibling.textContent=el.classList.contains('open')?'收起详情 ▲':'展开详情 ▼'}

/* ===== Lazy-load champion recs ===== */
let recsLoaded=false;
async function loadRecs(){
  if(recsLoaded)return;recsLoaded=true;
  try{
    const crRes=await fetch('data/champion_recs.json');
    if(crRes.ok){const crData=await crRes.json();CHAMP_RECS=crData.data||{};
      for(const [augId, recs] of Object.entries(CHAMP_RECS)){
        for(const r of recs){if(!HERO_RECS[r.h])HERO_RECS[r.h]=[];HERO_RECS[r.h].push({id:augId,rarity:r.rarity,grade:r.grade})}
      }
      renderAugs();renderHeroes();
    }
  }catch(e){}
}
/* ===== Tab Navigation ===== */
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.pnl').forEach(x=>x.classList.remove('on'));t.classList.add('on');document.getElementById('p-'+t.dataset.t).classList.add('on');if(t.dataset.t==='heroes'||t.dataset.t==='augments')loadRecs()}));

/* ===== Search Bindings ===== */
document.getElementById('synSearch').addEventListener('input',()=>{synLimit=12;renderSyn();});
document.getElementById('heroSearch').addEventListener('input',renderHeroes);
document.getElementById('augSearch').addEventListener('input',renderAugs);

/* ===== Data Loading via fetch() ===== */
async function loadData(){
  try{
    const [cRes,aRes,sRes,iRes]=await Promise.all([
      fetch('data/champions.json'),
      fetch('data/augments.json'),
      fetch('data/synergies.json'),
      fetch('data/issues.json')
    ]);
    const cData=await cRes.json();
    CK=cData.championKeys||{};
    HEROES=cData.champions||[];
    HEROES.forEach(h=>{if(h.aliases&&h.aliases.length)heroAliasMap[h.name]=h.aliases});
    AUGS=await aRes.json();
    AUG_WR={};AUGS.forEach(a=>{if(a.win_rate!=null)AUG_WR[a.name]=a.win_rate});
    SYN=await sRes.json();
    ISSUES=await iRes.json();
    renderSyn();renderHeroes();renderAugs();renderIssues();
    /* 加载 meta.json 更新版本信息 */
    fetch('data/meta.json').then(r=>r.json()).then(m=>{
      const el=document.getElementById('verInfo');if(!el)return;
      if(m.cdn_version&&m.cdn_version!==CDN_VER){CDN_VER=m.cdn_version;renderSyn();renderHeroes();renderAugs()}
      const t=new Date(m.last_updated),now=new Date(),d=Math.floor((now-t)/1e3);
      let ago;
      if(d<60)ago='刚刚';else if(d<3600)ago=Math.floor(d/60)+'分钟前';
      else if(d<86400)ago=Math.floor(d/3600)+'小时前';
      else if(d<604800)ago=Math.floor(d/86400)+'天前';
      else ago=t.toLocaleDateString('zh-CN');
      const st=m.stats||{};
      const parts=[];
      if(st.champions)parts.push(st.champions+'英雄');
      if(st.augments)parts.push(st.augments+'海克斯');
      if(st.synergies)parts.push(st.synergies+'组合');
      el.textContent='v'+(m.patch||'26.12')+' · 数据更新于 '+ago+(parts.length?' · '+parts.join(' / '):'');
    }).catch(()=>{});
  }catch(e){
    console.error('数据加载或渲染失败:',e);
    document.querySelector('.wrap').innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--txt3)"><h2 style="color:var(--t-bug);margin-bottom:12px">数据加载或渲染失败，请查看 Console 具体报错。</h2><p>请确保项目通过 HTTP 服务器访问（如 <code>python -m http.server</code>），而非直接打开文件。</p></div>';
    return;
  }
}
loadData();
